{% extends "base.html" %}

{% block title %}Mot de passe modifié - Movie Review{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-card">
        <div class="auth-card-header">
            <h1>Mot de passe modifié</h1>
            <p>
                Votre nouveau mot de passe a été enregistré. Vous pouvez

        <a href="{% url 'accounts:connexion' %}" class="btn btn-primary btn-block">
            Se connecter
        </a>
    </div>
</section>
{% endblock %}
